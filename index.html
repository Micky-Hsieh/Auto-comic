<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>漫畫圖片閱讀器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f3f0;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* ── Control Panel (top) ── */
    #panel {
      height: 38%;
      min-height: 0;
      background: #fafaf8;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    /* scrollable inner content */
    #panel-inner {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px 16px;
      flex: 1;
    }

    /* Two-column grid for fields on wider screens */
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .fields-grid .full { grid-column: 1 / -1; }

    /* ── Draggable Divider ── */
    #divider {
      height: 10px;
      background: #e2e0da;
      cursor: row-resize;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 10;
      touch-action: none;
    }

    #divider:hover,
    #divider.dragging { background: #bbb; }

    #divider::after {
      content: '';
      display: block;
      width: 36px;
      height: 3px;
      background: #999;
      border-radius: 2px;
    }

    body.resizing {
      cursor: row-resize !important;
      user-select: none;
    }

    body.resizing * { pointer-events: none; }
    body.resizing #divider { pointer-events: auto; }

    /* ── Viewer (bottom) ── */
    #viewer {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 0;
    }

    #viewer img {
      width: 100%;
      display: block;
    }

    #placeholder {
      color: #444;
      font-size: 14px;
      margin: auto;
      text-align: center;
      line-height: 2.4;
      padding: 24px;
    }

    #placeholder .icon {
      font-size: 48px;
      opacity: 0.2;
      display: block;
      margin-bottom: 8px;
    }

    /* ── Shared form styles ── */
    .brand {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
      padding-bottom: 5px;
      border-bottom: 1px solid #e8e6e0;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 12px;
      color: #666;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      font-size: 13px;
      background: #fff;
      border: 1px solid #dddbd5;
      border-radius: 7px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: #888; }

    .episode-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .episode-row .field { flex: 1; }

    .dash {
      font-size: 18px;
      color: #bbb;
      font-weight: 300;
      padding-top: 18px;
      flex-shrink: 0;
    }

    /* Reference link */
    #refLink {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4a90d9;
      text-decoration: none;
      background: #eef4fc;
      border: 1px solid #c8ddf5;
      border-radius: 7px;
      padding: 7px 10px;
      word-break: break-all;
      line-height: 1.5;
    }

    #refLink:hover { background: #ddeaf8; }

    #refLink svg { flex-shrink: 0; }

    /* URL preview */
    #urlPreview {
      font-size: 11px;
      color: #888;
      word-break: break-all;
      line-height: 1.7;
      background: #f0efe9;
      border: 1px solid #e2e0da;
      border-radius: 7px;
      padding: 7px 10px;
      font-family: monospace;
    }

    #urlPreview .highlight { color: #d06030; font-weight: 600; }

    /* Bottom row: progress + button */
    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #loadBtn {
      flex-shrink: 0;
      height: 36px;
      padding: 0 18px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    #loadBtn:hover { background: #333; }
    #loadBtn:active { transform: scale(0.97); }

    .progress-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #status {
      font-size: 11px;
      color: #888;
      min-height: 16px;
    }

    .progress-bar {
      height: 3px;
      background: #e8e6e0;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #1a1a1a;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Top control panel ── -->
  <div id="panel">
    <div id="panel-inner">

      <div class="brand">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
        漫畫圖片閱讀器
      </div>

      <!-- Reference URL -->
      <div class="field">
        <label>參考網址（點擊開啟）</label>
        <a id="refLink" href="https://p8.taoman.cc/scomic/zheyishiwoyaodangzhizun-taiyishengshuiyuanzhua4manye/0/" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          https://p8.taoman.cc/scomic/zheyishiwoyaodangzhizun-taiyishengshuiyuanzhua4manye/0/
        </a>
      </div>

      <div class="section-label">漫畫路徑</div>

      <div class="field full">
        <label>根路徑</label>
        <input type="text" id="rootUrl"
          value="https://p8.taoman.cc/scomic/zheyishiwoyaodangzhizun-taiyishengshuiyuanzhua4manye/0/"
          oninput="updatePreview()" />
      </div>

      <div class="fields-grid">
        <div class="field full">
          <label>集數 &amp; 編號</label>
          <div class="episode-row">
            <div class="field" style="gap:0">
              <input type="number" id="episode" value="556" min="1" placeholder="集數" oninput="updatePreview()" />
            </div>
            <span class="dash">-</span>
            <div class="field" style="gap:0">
              <input type="text" id="code" value="gj2a" placeholder="編號" oninput="updatePreview()" />
            </div>
          </div>
        </div>

        <div class="field">
          <label>起始頁</label>
          <input type="number" id="from" value="1" min="1" />
        </div>
        <div class="field">
          <label>結束頁</label>
          <input type="number" id="to" value="175" min="1" />
        </div>

        <div class="field">
          <label>副檔名</label>
          <input type="text" id="ext" value="jpg" oninput="updatePreview()" />
        </div>
      </div>

      <div class="field">
        <label>URL 預覽</label>
        <div id="urlPreview"></div>
      </div>

      <div class="action-row">
        <button id="loadBtn" onclick="loadImages()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          顯示圖片
        </button>
        <div class="progress-wrap">
          <div id="status"></div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Draggable horizontal divider ── -->
  <div id="divider"></div>

  <!-- ── Bottom viewer ── -->
  <div id="viewer">
    <div id="placeholder">
      <span class="icon">📖</span>
      設定路徑後點「顯示圖片」
    </div>
  </div>

</div>

<script>
  /* ════════════════════════════════
     Resizable panel — mouse + touch
  ════════════════════════════════ */
  const divider = document.getElementById('divider');
  const panel   = document.getElementById('panel');
  const app     = document.getElementById('app');

  let dragging = false;

  function onDragStart(e) {
    dragging = true;
    divider.classList.add('dragging');
    document.body.classList.add('resizing');
    e.preventDefault();
  }

  function onDragMove(e) {
    if (!dragging) return;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const rect    = app.getBoundingClientRect();
    const totalH  = rect.height;
    const offsetY = clientY - rect.top;
    const minPx   = totalH * 0.10;
    const maxPx   = totalH * 0.90;
    const newH    = Math.min(Math.max(offsetY, minPx), maxPx);
    panel.style.height = newH + 'px';
  }

  function onDragEnd() {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.classList.remove('resizing');
  }

  /* Mouse */
  divider.addEventListener('mousedown', onDragStart);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);

  /* Touch */
  divider.addEventListener('touchstart', onDragStart, { passive: false });
  document.addEventListener('touchmove',  onDragMove,  { passive: false });
  document.addEventListener('touchend',   onDragEnd);

  /* ════════════════════════════════
     URL helpers
  ════════════════════════════════ */
  function buildBaseUrl() {
    const root    = document.getElementById('rootUrl').value.trim().replace(/\/$/, '');
    const episode = document.getElementById('episode').value.trim();
    const code    = document.getElementById('code').value.trim();
    return root + '/' + episode + '-' + code + '/';
  }

  function updatePreview() {
    const ext  = document.getElementById('ext').value.trim() || 'jpg';
    const base = buildBaseUrl();
    document.getElementById('urlPreview').innerHTML =
      base + '<span class="highlight">1.' + ext + '</span>';
  }

  /* ════════════════════════════════
     Image loader
  ════════════════════════════════ */
  function loadImages() {
    const base   = buildBaseUrl();
    const ext    = document.getElementById('ext').value.trim() || 'jpg';
    const from   = parseInt(document.getElementById('from').value)  || 1;
    const to     = parseInt(document.getElementById('to').value)    || 1;
    const viewer = document.getElementById('viewer');
    const status = document.getElementById('status');
    const fill   = document.getElementById('progressFill');

    if (!base)     { status.textContent = '請填寫路徑欄位'; return; }
    if (from > to) { status.textContent = '起始頁不能大於結束頁'; return; }

    viewer.innerHTML = '';
    const total = to - from + 1;
    let loaded  = 0;
    status.textContent = '載入中… (0/' + total + ')';
    fill.style.width   = '0%';

    for (let i = from; i <= to; i++) {
      const img = document.createElement('img');
      img.referrerPolicy = 'no-referrer';
      img.src = base + i + '.' + ext;
      img.alt = '第 ' + i + ' 頁';
      img.onload = img.onerror = function (e) {
        if (e.type === 'error') this.style.display = 'none';
        loaded++;
        fill.style.width   = Math.round(loaded / total * 100) + '%';
        status.textContent = loaded < total
          ? '載入中… (' + loaded + '/' + total + ')'
          : '共 ' + total + ' 張（已全部處理）';
      };
      viewer.appendChild(img);
    }
  }

  updatePreview();
</script>
</body>
</html>
